services:

    ai-agents:
        container_name: ai-agents
        build: .
        mem_limit: 2G
        environment:
            - AI_API_URL=${AI_API_URL:?}
            - AI_API_KEY=${AI_API_KEY:?}
            - AI_CONTEXT_LENGTH=64000
            - AI_MODEL=${AI_MODEL:-default}
            - AUTHORIZED_PUBLIC_KEYS=${SSH_PUBLIC_KEY}
            - BRAVE_API_KEY=${BRAVE_API_KEY}
            - SIGNAL_ACCOUNT=
            - SIGNAL_ALLOWED_USERS=
            - SIGNAL_SERVER_URL=http://signal-cli:8080
        tmpfs:
            - /tmp:exec
        volumes:
            - "./data-local:/media/user"
        ports:
            - "127.0.0.1:8022:22"
